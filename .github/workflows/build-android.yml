name: Android 빌드 파이프라인

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      build_target:
        description: '빌드 타깃'
        required: true
        default: 'prod_release'
        type: choice
        options:
          - prod_release
          - local_debug

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Java 설정 (JDK 17)
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 의존성 설치
        run: npm ci

      - name: React Native 캐시 설정
        uses: actions/cache@v3
        with:
          path: ~/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.lock') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 빌드 타깃 및 버전 결정
        id: build_config
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TARGET="${{ github.event.inputs.build_target }}"
          else
            TARGET="prod_release"
          fi

          PKG_VERSION=$(node -p "require('./package.json').version")
          VERSION_CODE=$(( ${{ github.run_number }} * 100 + ${{ github.run_attempt }} ))
          echo "target=${TARGET}" >> "$GITHUB_OUTPUT"
          echo "version_name=${PKG_VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"

          if [ "$TARGET" = "prod_release" ]; then
            echo "env_file=.env.production" >> "$GITHUB_OUTPUT"
            echo "gradle_task=bundleProdRelease" >> "$GITHUB_OUTPUT"
            echo "artifact_path=android/app/build/outputs/bundle/prodRelease/app-prod-release.aab" >> "$GITHUB_OUTPUT"
            echo "artifact_type=AAB" >> "$GITHUB_OUTPUT"
          else
            echo "env_file=.env.local" >> "$GITHUB_OUTPUT"
            echo "gradle_task=assembleLocalDebug" >> "$GITHUB_OUTPUT"
            echo "artifact_path=android/app/build/outputs/apk/local/debug/app-local-debug.apk" >> "$GITHUB_OUTPUT"
            echo "artifact_type=APK" >> "$GITHUB_OUTPUT"
          fi

      - name: 환경 변수 파일 생성
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL }}
          KAKAO_APP_KEY: ${{ secrets.KAKAO_APP_KEY }}
          NAVER_MAP_CLIENT_ID: ${{ secrets.NAVER_MAP_CLIENT_ID }}
          LOCAL_API_BASE_URL: ${{ secrets.LOCAL_API_BASE_URL }}
          LOCAL_KAKAO_APP_KEY: ${{ secrets.LOCAL_KAKAO_APP_KEY }}
          LOCAL_NAVER_MAP_CLIENT_ID: ${{ secrets.LOCAL_NAVER_MAP_CLIENT_ID }}
        run: |
          set -euo pipefail

          TARGET="${{ steps.build_config.outputs.target }}"
          ENV_FILE="${{ steps.build_config.outputs.env_file }}"

          if [ "$TARGET" = "prod_release" ]; then
            if [ -z "${API_BASE_URL:-}" ]; then
              echo "[ERROR] required production secret missing: API_BASE_URL"
              exit 1
            fi
            EFFECTIVE_API_BASE_URL="${API_BASE_URL}"
            if [[ "${API_BASE_URL}" == "https://api.nearprice.kr" ]] || [[ "${API_BASE_URL}" == "https://api.near-price.kr" ]]; then
              echo "[WARN] deprecated API_BASE_URL detected (${API_BASE_URL})"
              echo "[WARN] fallback to https://api.bipanlife.com for this build"
              EFFECTIVE_API_BASE_URL="https://api.bipanlife.com"
            fi
            if [[ "${EFFECTIVE_API_BASE_URL}" != https://* ]]; then
              echo "[ERROR] production API_BASE_URL must start with https://"
              exit 1
            fi
            if ! curl -fsS --retry 3 --retry-all-errors --connect-timeout 5 --max-time 10 "${EFFECTIVE_API_BASE_URL}/health" > /dev/null; then
              echo "[ERROR] cannot reach ${EFFECTIVE_API_BASE_URL}/health"
              exit 1
            fi
            if [ -z "${KAKAO_APP_KEY:-}" ]; then
              echo "[ERROR] required production secret missing: KAKAO_APP_KEY"
              exit 1
            fi
            if [ -z "${NAVER_MAP_CLIENT_ID:-}" ]; then
              echo "[ERROR] required production secret missing: NAVER_MAP_CLIENT_ID"
              exit 1
            fi

            {
              echo "API_BASE_URL=${EFFECTIVE_API_BASE_URL}"
              echo "KAKAO_APP_KEY=${KAKAO_APP_KEY}"
              echo "NAVER_MAP_CLIENT_ID=${NAVER_MAP_CLIENT_ID}"
            } > "$ENV_FILE"
          else
            {
              echo "API_BASE_URL=${LOCAL_API_BASE_URL:-http://10.0.2.2:3000}"
              echo "KAKAO_APP_KEY=${LOCAL_KAKAO_APP_KEY:-KAKAO_APP_KEY_NOT_SET}"
              echo "NAVER_MAP_CLIENT_ID=${LOCAL_NAVER_MAP_CLIENT_ID:-NAVER_MAP_CLIENT_ID_NOT_SET}"
            } > "$ENV_FILE"
          fi

      - name: 필수 시크릿 존재 확인 (공통)
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "${GOOGLE_SERVICES_JSON_BASE64:-}" ]; then
            echo "[ERROR] required secret missing: GOOGLE_SERVICES_JSON_BASE64"
            exit 1
          fi

      - name: 필수 시크릿 존재 확인 (Prod Release)
        if: steps.build_config.outputs.target == 'prod_release'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          for key in KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [ -z "${!key:-}" ]; then
              echo "[ERROR] required release secret missing: $key"
              exit 1
            fi
          done

      - name: google-services.json 복원
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          set -euo pipefail
          printf '%s' "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > android/app/google-services.json

      - name: 린팅
        run: npm run lint

      - name: 테스트 실행
        run: npm test -- --passWithNoTests

      - name: 안드로이드 폴더 권한 설정
        run: chmod +x android/gradlew

      - name: Android 빌드
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          TARGET="${{ steps.build_config.outputs.target }}"
          ENV_FILE="${{ steps.build_config.outputs.env_file }}"
          TASK="${{ steps.build_config.outputs.gradle_task }}"

          if [ "$TARGET" = "prod_release" ]; then
            printf '%s' "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
            cp android/gradle.properties android/gradle.properties.bak
            echo "KEYSTORE_PATH=./release.keystore" >> android/gradle.properties
            echo "KEYSTORE_PASSWORD=${KEYSTORE_PASSWORD}" >> android/gradle.properties
            echo "KEY_ALIAS=${KEY_ALIAS}" >> android/gradle.properties
            echo "KEY_PASSWORD=${KEY_PASSWORD}" >> android/gradle.properties
          fi

          cd android
          ENVFILE="../${ENV_FILE}" ./gradlew clean "$TASK" --no-daemon --stacktrace \
            -PVERSION_CODE=${{ steps.build_config.outputs.version_code }} \
            -PVERSION_NAME=${{ steps.build_config.outputs.version_name }}

      - name: 빌드 산출물 확인
        run: |
          set -euo pipefail
          if [ -f "${{ steps.build_config.outputs.artifact_path }}" ]; then
            ls -lh "${{ steps.build_config.outputs.artifact_path }}"
          else
            echo "빌드 산출물을 찾을 수 없습니다"
            find android/app/build/outputs -name "*.aab" -o -name "*.apk" -ls
            exit 1
          fi

      - name: 빌드 산출물 파일명 생성
        id: artifact_meta
        run: |
          set -euo pipefail
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          if [ "${{ steps.build_config.outputs.target }}" = "prod_release" ]; then
            echo "artifact_name=near-price-${TIMESTAMP}-prod.aab" >> "$GITHUB_OUTPUT"
          else
            echo "artifact_name=near-price-${TIMESTAMP}-local-debug.apk" >> "$GITHUB_OUTPUT"
          fi

      - name: 빌드 산출물 파일명 변경
        run: |
          set -euo pipefail
          cp "${{ steps.build_config.outputs.artifact_path }}" "${{ steps.artifact_meta.outputs.artifact_name }}"

      - name: 빌드 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_meta.outputs.artifact_name }}
          path: ${{ steps.artifact_meta.outputs.artifact_name }}
          retention-days: 30

      - name: Release 생성 및 산출물 업로드
        if: github.ref == 'refs/heads/main' && steps.build_config.outputs.target == 'prod_release'
        continue-on-error: true
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.artifact_meta.outputs.artifact_name }}
          tag_name: android-${{ github.run_number }}
          body: |
            # NearPrice Android Production 빌드 산출물
            - **빌드 번호**: ${{ github.run_number }}
            - **커밋**: ${{ github.sha }}
            - **시간**: ${{ github.event.head_commit.timestamp }}
            - **산출물 타입**: ${{ steps.build_config.outputs.artifact_type }}
            - **파일**: ${{ steps.artifact_meta.outputs.artifact_name }}

            ## 배포 메모
            - `bundleProdRelease` 결과물이며 프로덕션 환경 변수(`.env.production`)로 빌드됨
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Slack 알림 (성공)
        if: ${{ success() && env.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "✅ NearPrice Android 빌드 성공",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*NearPrice Android 빌드 성공* ✅\n*타깃*: ${{ steps.build_config.outputs.target }}\n*산출물*: ${{ steps.artifact_meta.outputs.artifact_name }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Slack 알림 (실패)
        if: ${{ failure() && env.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "❌ NearPrice Android 빌드 실패",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*NearPrice Android 빌드 실패* ❌\n*타깃*: ${{ steps.build_config.outputs.target }}\n*작업*: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|자세히 보기>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: 민감 파일 정리
        if: always()
        run: |
          set -euo pipefail
          rm -f .env.local .env.production android/app/release.keystore android/app/google-services.json
          if [ -f android/gradle.properties.bak ]; then
            mv android/gradle.properties.bak android/gradle.properties
          fi
